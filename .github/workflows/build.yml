name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-2022
            target: x86_64-windows-msvc
            artifact: ftk-windows-x86_64
            backend: minhook
          - name: Android aarch64
            os: ubuntu-24.04
            target: aarch64-linux-android.35
            artifact: ftk-android-aarch64
            backend: shadowhook
          - name: iOS aarch64
            os: macos-15
            target: aarch64-ios
            artifact: ftk-ios-aarch64
            backend: tinyhook

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Fetch Lua
        shell: bash
        run: |
          git clone --depth 1 --branch v5.4.8 https://github.com/lua/lua.git deps/lua

      - name: Fetch MinHook
        if: matrix.backend == 'minhook'
        shell: bash
        run: git clone --depth 1 --branch v1.3.4 https://github.com/TsudaKageyu/minhook.git deps/minhook

      - name: Fetch ShadowHook
        if: matrix.backend == 'shadowhook'
        shell: bash
        run: git clone --depth 1 https://github.com/bytedance/android-inline-hook.git deps/shadowhook

      - name: Fetch tinyhook
        if: matrix.backend == 'tinyhook'
        shell: bash
        run: git clone --depth 1 https://github.com/Antibioticss/tinyhook.git deps/tinyhook

      - name: Compile
        shell: bash
        run: |
          case "${{ matrix.backend }}" in
            minhook)
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Dminhook-root=deps/minhook --summary all
              ;;
            shadowhook)
              NDK_ROOT="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}}"
              test -n "$NDK_ROOT"
              ANDROID_SYSROOT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
              printf 'include_dir=%s/usr/include\nsys_include_dir=%s/usr/include\ncrt_dir=%s/usr/lib/aarch64-linux-android/35\nmsvc_lib_dir=\nkernel32_lib_dir=\n' "$ANDROID_SYSROOT" "$ANDROID_SYSROOT" "$ANDROID_SYSROOT" > android-libc.txt
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Dshadowhook-root=deps/shadowhook -Dandroid-sysroot="$ANDROID_SYSROOT" --libc android-libc.txt --summary all
              ;;
            tinyhook)
              IOS_SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
              CLANG_PATH="$(xcrun --toolchain XcodeDefault --find clang)"
              TOOLCHAIN_INCLUDE="$(cd "$(dirname "$CLANG_PATH")/.." && pwd)/include"
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Dtinyhook-root=deps/tinyhook -Dapple-sysroot="$IOS_SYSROOT" -Dapple-toolchain-include="$TOOLCHAIN_INCLUDE" --summary all
              ;;
          esac

      - name: Host tests
        if: matrix.os == 'windows-2022'
        shell: bash
        run: zig build test -Dlua-root=deps/lua -Dminhook-root=deps/minhook --summary all

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            zig-out/bin/*
            zig-out/lib/*

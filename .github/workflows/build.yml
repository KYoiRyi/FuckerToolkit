name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-2022
            target: x86_64-windows-msvc
            artifact: ftk-windows-x86_64
            backend: minhook
          - name: Android aarch64
            os: ubuntu-24.04
            target: aarch64-linux-android.35
            artifact: ftk-android-aarch64
            backend: shadowhook
          - name: iOS aarch64
            os: macos-15
            target: aarch64-ios
            artifact: ftk-ios-aarch64
            backend: dobby

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Fetch Lua
        shell: bash
        run: |
          git clone --depth 1 --branch v5.4.8 https://github.com/lua/lua.git deps/lua

      - name: Fetch MinHook
        if: matrix.backend == 'minhook'
        shell: bash
        run: git clone --depth 1 --branch v1.3.4 https://github.com/TsudaKageyu/minhook.git deps/minhook

      - name: Fetch ShadowHook
        if: matrix.backend == 'shadowhook'
        shell: bash
        run: git clone --depth 1 https://github.com/bytedance/android-inline-hook.git deps/shadowhook

      - name: Fetch Dobby
        if: matrix.backend == 'dobby'
        shell: bash
        run: git clone --depth 1 https://github.com/jmpews/Dobby.git deps/dobby

      - name: Install ldid
        if: matrix.backend == 'dobby'
        shell: bash
        run: brew install ldid

      - name: Compile
        shell: bash
        run: |
          case "${{ matrix.backend }}" in
            minhook)
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Dminhook-root=deps/minhook --summary all
              ;;
            shadowhook)
              NDK_ROOT="${ANDROID_NDK_LATEST_HOME:-${ANDROID_NDK_HOME:-${ANDROID_NDK_ROOT:-}}}"
              test -n "$NDK_ROOT"
              ANDROID_SYSROOT="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
              printf 'include_dir=%s/usr/include\nsys_include_dir=%s/usr/include\ncrt_dir=%s/usr/lib/aarch64-linux-android/35\nmsvc_lib_dir=\nkernel32_lib_dir=\ngcc_dir=\n' "$ANDROID_SYSROOT" "$ANDROID_SYSROOT" "$ANDROID_SYSROOT" > android-libc.txt
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Dshadowhook-root=deps/shadowhook -Dandroid-sysroot="$ANDROID_SYSROOT" --libc android-libc.txt --summary all
              ;;
            dobby)
              IOS_SYSROOT="$(xcrun --sdk iphoneos --show-sdk-path)"
              CLANG_PATH="$(xcrun --toolchain XcodeDefault --find clang)"
              TOOLCHAIN_INCLUDE="$(cd "$(dirname "$CLANG_PATH")/.." && pwd)/include"
              cmake -S deps/dobby -B deps/dobby-build \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_SYSTEM_NAME=iOS \
                -DCMAKE_SYSTEM_PROCESSOR=arm64 \
                -DCMAKE_OSX_SYSROOT=iphoneos \
                -DCMAKE_OSX_ARCHITECTURES=arm64 \
                -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
                -DDOBBY_BUILD_SILICON=ON \
                -DDOBBY_GENERATE_SHARED=OFF \
                -DDOBBY_BUILD_EXAMPLE=OFF \
                -DDOBBY_BUILD_TEST=OFF
              cmake --build deps/dobby-build --config Release --target dobby_static --parallel
              DOBBY_LIB="$(find deps/dobby-build -name 'libdobby.a' -o -name 'libdobby_static.a' | head -n 1)"
              test -n "$DOBBY_LIB"
              zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe -Dlua-root=deps/lua -Ddobby-root=deps/dobby -Ddobby-lib="$DOBBY_LIB" -Dapple-sysroot="$IOS_SYSROOT" -Dapple-toolchain-include="$TOOLCHAIN_INCLUDE" --summary all
              ;;
          esac

      - name: Host tests
        if: matrix.os == 'windows-2022'
        shell: bash
        run: zig build test -Dlua-root=deps/lua -Dminhook-root=deps/minhook --summary all

      - name: Stage artifact
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          case "${{ matrix.backend }}" in
            minhook)
              cp zig-out/bin/ftk.dll dist/ftk.dll
              ;;
            shadowhook)
              cp zig-out/lib/libftk.so dist/libftk.so
              ;;
            dobby)
              cp zig-out/lib/libftk.dylib dist/libftk.dylib
              ldid -S dist/libftk.dylib
              otool -l dist/libftk.dylib >/dev/null
              python3 .github/scripts/check_macho_header.py dist/libftk.dylib
              ;;
          esac
          test "$(find dist -type f | wc -l | tr -d ' ')" = "1"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

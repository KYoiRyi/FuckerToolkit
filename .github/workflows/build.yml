name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compile:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x86_64
            os: windows-2022
            target: x86_64-windows-msvc
            artifact: ftk-windows-x86_64
          - name: Android aarch64
            os: ubuntu-24.04
            target: aarch64-linux-android
            artifact: ftk-android-aarch64
          - name: iOS aarch64
            os: macos-15
            target: aarch64-ios
            artifact: ftk-ios-aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.14.1

      - name: Compile
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe --summary all

      - name: Host tests
        if: matrix.os == 'windows-2022'
        run: zig build test --summary all

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: zig-out/lib/*
